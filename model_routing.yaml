# Model routing configuration for the research pipeline
# Provider: auto-detected from user's config at runtime
#
# TIER SYSTEM:
#   frontier  - Best available model. Used for writing, final revision.
#   mid       - Good quality, lower cost. Used for research, reviews.
#   cheap     - Fast and cheap. Used for quality gate, synthesizer, simple tasks.
#
# At the confirmation step, the orchestrator reads the active provider and suggests
# models from this file. The user confirms or overrides before any run starts.
# For unknown providers, the agent lists available models and asks the user to assign tiers.

provider: github-copilot

tier_models:
  github-copilot:
    frontier: claude-sonnet-4-6      # heavyweight writing
    mid: gpt-4o                      # research, reviews
    cheap: gpt-4o-mini               # quality gate, synthesizer, general review
  custom:  # OpenCode Go / opencode.ai/zen
    frontier: glm-5
    mid: kimi-k2.5
    cheap: minimax-m2.5
  anthropic:
    frontier: claude-opus-4-6
    mid: claude-sonnet-4-6
    cheap: claude-haiku-4-5-20251001
  openrouter:
    frontier: anthropic/claude-opus-4-6
    mid: anthropic/claude-sonnet-4-6
    cheap: google/gemini-3-flash
  openai:
    frontier: gpt-4o
    mid: gpt-4o
    cheap: gpt-4o-mini
  # Any other provider: agent lists available models and asks user to assign tiers at confirmation

roles:
  research:
    tier: mid
    description: "Source discovery and research brief compilation"
    toolsets: [web, terminal]
    max_iterations: 18
  writer:
    tier: frontier
    description: "Section-by-section manuscript drafting (written part by part to optimize depth and tokens)"
    toolsets: []
    max_iterations: 12
  review_academic:
    tier: mid
    description: "Academic structure and argument review"
    toolsets: []
    max_iterations: 8
  review_general:
    tier: cheap
    description: "Readability and engagement review"
    toolsets: []
    max_iterations: 8
  review_source:
    tier: mid
    description: "Citation verification and source quality"
    toolsets: []
    max_iterations: 8
  synthesizer:
    tier: cheap
    description: "Merge reviewer feedback into revision brief"
    toolsets: []
    max_iterations: 8
  quality_gate:
    tier: cheap
    description: "Pass/revise/warn decision"
    toolsets: []
    max_iterations: 6
