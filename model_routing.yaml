# Model routing configuration for the research pipeline
# Provider: auto-detected from user's Hermes config at runtime
#
# TIER SYSTEM:
#   frontier  - Best available model. Used for writing, final revision.
#   mid       - Good quality, lower cost. Used for reviews, synthesis.
#   cheap     - Fast and cheap. Used for quality gate, simple tasks.
#
# The orchestrator reads the user's provider from ~/.hermes/config.yaml at startup
# and maps tiers to concrete model slugs. Users confirm model assignments before runs start.

provider: custom

# Tier-to-model mapping per provider
tier_models:
  custom:  # OpenCode Go / opencode.ai/zen
    frontier: glm-5
    mid: kimi-k2.5
    cheap: minimax-m2.5
  nous:
    frontier: ~  # resolved from ~/.hermes/config.yaml at runtime
    mid: ~
    cheap: ~
  anthropic:
    frontier: claude-opus-4-6
    mid: claude-sonnet-4-6
    cheap: claude-haiku-4-5-20251001
  openrouter:
    frontier: anthropic/claude-opus-4-6
    mid: anthropic/claude-sonnet-4-6
    cheap: google/gemini-3-flash
  openai-codex:
    frontier: gpt-5.4
    mid: gpt-5.3-codex
    cheap: gpt-5.1-codex-mini

roles:
  research:
    tier: mid
    description: "Source discovery and research brief compilation"
    toolsets: [web, terminal]
    max_iterations: 18
  writer:
    tier: frontier
    description: "Section-by-section manuscript drafting (written part by part)"
    toolsets: []
    max_iterations: 12
  review_academic:
    tier: mid
    description: "Academic structure and argument review"
    toolsets: []
    max_iterations: 8
  review_general:
    tier: cheap
    description: "Readability and engagement review"
    toolsets: []
    max_iterations: 8
  review_source:
    tier: mid
    description: "Citation verification and source quality"
    toolsets: []
    max_iterations: 8
  synthesizer:
    tier: cheap
    description: "Merge reviewer feedback into revision brief"
    toolsets: []
    max_iterations: 8
  quality_gate:
    tier: cheap
    description: "Pass/revise/warn decision"
    toolsets: []
    max_iterations: 6
